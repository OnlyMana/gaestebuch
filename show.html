<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">  
<title>Freunde Karussell</title>
<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 10px 0;
}

.carousel-container {
    perspective: 1000px;
    margin-top: 30px;
}

.carousel {
    width: 90vw;
    max-width: 320px;
    height: 90vw;
    max-height: 320px;
    margin: auto;
    position: relative;
    transform-style: preserve-3d;
}

.carousel img {
    position: absolute;
    width: 75vw;
    max-width: 270px;
    height: 75vw;
    max-height: 270px;
    object-fit: cover;
    border-radius: 10px;
    left: 50%;
    top: 50%;
    transform-style: preserve-3d;
    transform-origin: center center;
    transform: translate(-50%, -50%);
    transition: transform 1s;
}

.quote {
    margin-top: 15px;
    font-style: italic;
    font-size: 18px;
    padding: 0 10px;
    min-height: 48px; /* Platz für Text */
}

.empty {
    margin-top: 50px;
    font-size: 20px;
    color: #ccc;
}
</style>
</head>

<body>

<h1>👥 Meine Freunde</h1>

<div class="carousel-container">
    <div class="carousel" id="carousel"></div>
</div>

<div class="quote" id="quote"></div>

<div class="empty" id="emptyMessage"></div>

<script>
const entries = JSON.parse(localStorage.getItem("entries")) || [];
const carousel = document.getElementById("carousel");
const quote = document.getElementById("quote");
const emptyMessage = document.getElementById("emptyMessage");

if(entries.length === 0){
    emptyMessage.innerText = "😢 Noch keine Einträge vorhanden";
} else {
    const total = entries.length;
    const angle = 360 / total;
    const imgElements = [];

    entries.forEach((entry, i) => {
        const img = document.createElement("img");
        img.src = entry.image;
        carousel.appendChild(img);
        imgElements.push(img);
    });

    let current = 0;

    function showEntry(index) {
        imgElements.forEach((img, i) => {
            const rotation = angle * (i - index);
            img.style.transform = `rotateY(${rotation}deg) translateZ(400px) translate(-50%, -50%)`;
        });
        quote.innerText = entries[index].quote;
    }

    showEntry(current);

    setInterval(() => {
        current = (current + 1) % total;
        showEntry(current);
    }, 3000);
}
</script>

</body>
</html>
