<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<!-- ✅ WICHTIG: verhindert das Rauszoomen -->
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gästebuch Eintrag</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
    margin: 0;
    padding: 10px;
}

h1 {
    font-size: 22px;
}

form {
    background: white;
    padding: 15px;
    margin: 20px auto;
    width: 90%;
    max-width: 400px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

input, textarea {
    width: 100%;
    margin: 8px 0;
    padding: 12px;
    font-size: 16px; /* verhindert Zoom auf iPhone */
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

textarea {
    min-height: 80px;
    resize: none;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: #3498db;
    color: white;
    border: none;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
}

button:active {
    background: #2980b9;
}
</style>
</head>

<body>

<h1>📖 Gästebuch</h1>

<form id="guestForm">
    <input type="text" placeholder="Name" id="name" required><br>
    <input type="text" placeholder="Nachname" id="lastname"><br>
    <input type="text" placeholder="Hobbys" id="hobbies"><br>
    <textarea placeholder="Lieblingsspruch" id="quote" required></textarea><br>
    <input type="file" id="image" accept="image/*" required><br>
    <button type="submit">Speichern</button>
</form>

<script>
let entries = JSON.parse(localStorage.getItem("entries")) || [];

document.getElementById("guestForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const reader = new FileReader();
    const file = document.getElementById("image").files[0];

    reader.onload = function() {
        const entry = {
            name: document.getElementById("name").value,
            lastname: document.getElementById("lastname").value,
            hobbies: document.getElementById("hobbies").value,
            quote: document.getElementById("quote").value,
            image: reader.result
        };

        entries.push(entry);
        localStorage.setItem("entries", JSON.stringify(entries));

        window.location.href = "show.html";
    };

    if (file) reader.readAsDataURL(file);
});
</script>

</body>
</html>
